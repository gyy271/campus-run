<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>校园帮帮乐 · 跑腿服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8fafc; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; padding: 20px 16px 40px; color: #1e293b; }
        .container { max-width: 560px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 1.9rem; background: linear-gradient(135deg, #3b82f6, #06b6d4); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .services-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
        .service-card { flex: 1 1 calc(50% - 12px); background: white; border-radius: 24px; padding: 14px 8px; text-align: center; cursor: pointer; border: 1.5px solid #e2e8f0; transition: 0.2s; }
        .service-card.active { border-color: #3b82f6; background: #eff6ff; }
        .service-price { font-weight: 600; color: #f97316; background: #fff1e6; display: inline-block; padding: 2px 10px; border-radius: 30px; margin-top: 6px; }
        .form-panel { background: white; border-radius: 28px; padding: 20px; margin-bottom: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.85rem; color: #334155; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-size: 0.9rem; font-family: inherit; }
        .dynamic-fields { background: #f9fafb; border-radius: 20px; padding: 12px 14px; margin: 8px 0; }
        .price-slider-area { background: #fef9e6; border-radius: 20px; padding: 12px 14px; margin-top: 8px; }
        .total-price { background: #f1f5f9; border-radius: 30px; padding: 12px 16px; text-align: center; font-weight: 700; margin: 16px 0; }
        .submit-btn { background: linear-gradient(95deg, #3b82f6, #06b6d4); width: 100%; border: none; padding: 14px; border-radius: 40px; font-weight: 700; color: white; cursor: pointer; font-size: 1rem; margin-top: 8px; }
        .order-section { background: white; border-radius: 28px; padding: 20px; margin-top: 12px; }
        .order-list { max-height: 380px; overflow-y: auto; }
        .order-item { background: #fafcff; border-radius: 20px; padding: 12px; border: 1px solid #eef2f8; margin-bottom: 12px; }
        .qrcode-area { background: white; border-radius: 28px; padding: 16px; margin-top: 24px; text-align: center; border: 1px dashed #cbd5e1; }
        #qrcode { display: flex; justify-content: center; }
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 20px; border-radius: 60px; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 999; }
        .delivery-note { font-size: 0.7rem; color: #6c757d; margin-top: 4px; text-align: right; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header"><h1>🏃 校园帮帮乐</h1><p>24地质本 · 极速跑腿</p></div>
    <div class="services-grid" id="servicesGrid">
        <div class="service-card" data-service="express" data-price="1.5"><div>📦</div><div>快递帮取</div><div class="service-price">¥1.5</div></div>
        <div class="service-card" data-service="food" data-price="1.0"><div>🍱</div><div>外卖到寝</div><div class="service-price">¥1</div></div>
        <div class="service-card" data-service="supermarket" data-price="1.0"><div>🛒</div><div>超市代购</div><div class="service-price">¥1</div></div>
        <div class="service-card" data-service="other" data-price="custom"><div>🏃</div><div>其他代跑</div><div class="service-price">¥1~5</div></div>
    </div>
    <div class="form-panel">
        <div class="form-title">📝 填写订单</div>
        
        <!-- 注意：这里使用 Netlify Forms，必须添加 netlify 属性 -->
        <form name="campus-order" method="POST" data-netlify="true" netlify-honeypot="bot-field">
            <input type="hidden" name="form-name" value="campus-order">
            
            <div class="input-group"><label>👤 姓名</label><input type="text" name="userName" placeholder="例: 张三" required></div>
            <div class="input-group"><label>📞 电话</label><input type="tel" name="userPhone" placeholder="长号/短号" required></div>
            <div class="input-group"><label>🏠 宿舍</label><input type="text" name="dorm" placeholder="例: 7栋203室" required></div>
            <div class="input-group"><label>⏰ 期望配送时间</label><input type="datetime-local" name="deliveryTime" id="deliveryTime" step="900" required></div>
            <div class="delivery-note">⚠️ 只能选择当前时间之后的时间</div>
            
            <!-- 服务类型（隐藏，由 JavaScript 动态设置） -->
            <input type="hidden" name="serviceType" id="serviceTypeInput" value="快递帮取">
            <input type="hidden" name="servicePrice" id="servicePriceInput" value="1.5">
            
            <div id="dynamicFieldsContainer" class="dynamic-fields"></div>
            <div id="customPriceArea" style="display:none;" class="price-slider-area">
                <span>💰 自定义价格 (1~5元)</span>
                <input type="range" id="customPriceSlider" min="1" max="5" step="0.5" value="2.5">
                <div><span>¥1</span><span id="priceValueShow">¥2.5</span><span>¥5</span></div>
            </div>
            <div class="total-price" id="totalPreview">💰 总计: ¥1.50</div>
            <button type="submit" class="submit-btn">✅ 立即下单</button>
        </form>
    </div>
    <div class="order-section">
        <h3>📋 我的订单</h3>
        <div id="orderListContainer" class="order-list"><div class="empty-msg">暂无订单（仅展示本地记录）</div></div>
    </div>
    <div class="qrcode-area"><p>📱 微信/浏览器扫一扫</p><div id="qrcode"></div><p>分享二维码给好友</p></div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // 服务切换与动态表单（同上，需同时更新隐藏字段）
    let currentService = "express";
    let currentFixedPrice = 1.5;
    let customPrice = 2.5;
    const dynamicFieldsMap = {
        express: { label: "📮 取件码/快递点", placeholder: "例: 菜鸟驿站 2号柜 A123", type: "text" },
        food: { label: "🍔 外卖商家+餐品", placeholder: "例: 杨国福 微辣", type: "text" },
        supermarket: { label: "🛍️ 购物清单", placeholder: "例: 农夫山泉1箱+纸巾2包", type: "textarea" },
        other: { label: "📝 任务描述", placeholder: "例: 图书馆还书", type: "textarea" }
    };
    function showToast(msg) { let t = document.getElementById('toastMsg'); t.textContent = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }
    function renderDynamicFields() {
        let cfg = dynamicFieldsMap[currentService];
        let html = `<label>${cfg.label}</label>`;
        if (cfg.type === 'textarea') html += `<textarea name="serviceDetail" rows="2" id="dynamic_input" placeholder="${cfg.placeholder}" required></textarea>`;
        else html += `<input type="text" name="serviceDetail" id="dynamic_input" placeholder="${cfg.placeholder}" required>`;
        document.getElementById('dynamicFieldsContainer').innerHTML = html;
    }
    function updateTotalPreview() {
        let price = currentService === 'other' ? customPrice : currentFixedPrice;
        document.getElementById('totalPreview').innerHTML = `💰 总计: ¥${price.toFixed(2)}`;
        // 更新隐藏价格字段
        document.getElementById('servicePriceInput').value = price;
    }
    function switchService(service, price) {
        currentService = service;
        if (service === 'other') {
            document.getElementById('customPriceArea').style.display = 'block';
            customPrice = parseFloat(document.getElementById('customPriceSlider').value);
            document.getElementById('priceValueShow').innerText = `¥${customPrice.toFixed(2)}`;
            document.getElementById('serviceTypeInput').value = '其他代跑';
        } else {
            document.getElementById('customPriceArea').style.display = 'none';
            currentFixedPrice = price;
            let serviceName = '';
            if (service === 'express') serviceName = '快递帮取';
            else if (service === 'food') serviceName = '外卖到寝';
            else serviceName = '超市代购';
            document.getElementById('serviceTypeInput').value = serviceName;
        }
        document.querySelectorAll('.service-card').forEach(card => {
            if (card.getAttribute('data-service') === service) card.classList.add('active');
            else card.classList.remove('active');
        });
        renderDynamicFields();
        updateTotalPreview();
    }
    document.querySelectorAll('.service-card').forEach(card => {
        card.addEventListener('click', () => {
            let svc = card.getAttribute('data-service');
            if (svc === 'other') switchService('other', 0);
            else switchService(svc, parseFloat(card.getAttribute('data-price')));
        });
    });
    document.getElementById('customPriceSlider')?.addEventListener('input', (e) => {
        customPrice = parseFloat(e.target.value);
        document.getElementById('priceValueShow').innerText = `¥${customPrice.toFixed(2)}`;
        if (currentService === 'other') updateTotalPreview();
    });
    switchService('express', 1.5);

    // 配送时间限制（只能选未来时间）
    const deliveryTimeInput = document.getElementById('deliveryTime');
    function setMinDeliveryTime() {
        const now = new Date();
        const minTime = new Date(now.getTime() + 30 * 60000);
        const year = minTime.getFullYear();
        const month = String(minTime.getMonth() + 1).padStart(2, '0');
        const day = String(minTime.getDate()).padStart(2, '0');
        const hours = String(minTime.getHours()).padStart(2, '0');
        const minutes = String(minTime.getMinutes()).padStart(2, '0');
        const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
        deliveryTimeInput.min = minDateTime;
        if (!deliveryTimeInput.value || deliveryTimeInput.value < minDateTime) {
            deliveryTimeInput.value = minDateTime;
        }
    }
    setMinDeliveryTime();
    setInterval(setMinDeliveryTime, 60000);
    deliveryTimeInput.addEventListener('change', function() {
        const now = new Date();
        if (new Date(this.value) < now) {
            showToast('❌ 不能选择过去的时间，已自动调整');
            setMinDeliveryTime();
        }
    });

    // 本地订单存储（仅作备份展示）
    let orders = JSON.parse(localStorage.getItem('campus_orders') || '[]');
    function renderOrders() {
        let container = document.getElementById('orderListContainer');
        if (orders.length === 0) { container.innerHTML = '<div class="empty-msg">暂无订单（仅展示本地记录）</div>'; return; }
        let html = '';
        orders.forEach((o, idx) => {
            let deliveryInfo = o.deliveryTime ? `⏰ 期望送达: ${new Date(o.deliveryTime).toLocaleString()}<br>` : '';
            html += `<div class="order-item"><b>${o.serviceName}</b> ¥${o.totalPrice}<br>${o.userName} ${o.userPhone}<br>${o.dorm}<br>${deliveryInfo}<small>${o.detail || ''}</small><br><button onclick="deleteOrder(${idx})">删除</button></div>`;
        });
        container.innerHTML = html;
    }
    window.deleteOrder = function(idx) { orders.splice(idx,1); localStorage.setItem('campus_orders',JSON.stringify(orders)); renderOrders(); };
    function saveOrderLocally(order) { orders.unshift(order); localStorage.setItem('campus_orders',JSON.stringify(orders)); renderOrders(); }

    // 拦截表单提交，同时保存到本地（Forms 会异步提交，这里额外做本地存储）
    const form = document.querySelector('form');
    form.addEventListener('submit', function(e) {
        // 获取表单数据
        const userName = document.querySelector('[name="userName"]').value;
        const userPhone = document.querySelector('[name="userPhone"]').value;
        const dorm = document.querySelector('[name="dorm"]').value;
        const deliveryTime = document.querySelector('[name="deliveryTime"]').value;
        const serviceType = document.querySelector('[name="serviceType"]').value;
        const servicePrice = parseFloat(document.querySelector('[name="servicePrice"]').value);
        const serviceDetail = document.querySelector('[name="serviceDetail"]')?.value || '';
        
        if (!userName || !userPhone || !dorm || !deliveryTime || !serviceDetail) {
            e.preventDefault();
            showToast('请填写完整信息');
            return;
        }
        // 校验时间
        if (new Date(deliveryTime) < new Date()) {
            e.preventDefault();
            showToast('❌ 配送时间不能是过去的时间');
            setMinDeliveryTime();
            return;
        }
        // 保存到本地
        const order = {
            serviceName: serviceType,
            totalPrice: servicePrice,
            userName, userPhone, dorm,
            deliveryTime,
            detail: serviceDetail,
            timestamp: new Date().toISOString()
        };
        saveOrderLocally(order);
        // 不阻止表单提交，让 Netlify 也处理
        setTimeout(() => {
            showToast('✅ 订单已提交！');
            // 清空部分字段（保留配送时间）
            document.querySelector('[name="userName"]').value = '';
            document.querySelector('[name="userPhone"]').value = '';
            document.querySelector('[name="dorm"]').value = '';
            document.querySelector('[name="serviceDetail"]').value = '';
            setMinDeliveryTime();
        }, 100);
    });
    renderOrders();
    new QRCode(document.getElementById('qrcode'), { text: window.location.href, width: 120, height: 120 });
</script>
</body>
</html>
